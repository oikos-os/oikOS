services:
  oikos-core:
    build: .
    ports:
      - "127.0.0.1:8420:8420"
      - "127.0.0.1:8421:8421"
    volumes:
      - ./vault:/app/vault
      - ./logs:/app/logs
      - ./memory:/app/memory
      - ./staging:/app/staging
      - ./config:/app/config
    environment:
      - OIKOS_API_KEY=${OIKOS_API_KEY:-}
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  searxng:
    image: searxng/searxng
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - SEARXNG_TELEMETRY=false
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  ollama_models:
